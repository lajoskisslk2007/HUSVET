<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Húsvéti tojásfestő</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="app-container">
    <h1>Húsvéti tojás festő</h1>
    <p>Válassz színt alul a vödrökből, majd húzz az egérrel a tojás felületén.</p>
    <div class="canvas-wrap">
      <canvas id="paintingCanvas" width="700" height="500"></canvas>
    </div>
    <div class="palette" id="palette">
      <button class="bucket" data-color="#e53935" style="background:#e53935" title="Piros"></button>
      <button class="bucket" data-color="#ffb300" style="background:#ffb300" title="Sárga"></button>
      <button class="bucket" data-color="#43a047" style="background:#43a047" title="Zöld"></button>
      <button class="bucket" data-color="#1e88e5" style="background:#1e88e5" title="Kék"></button>
      <button class="bucket" data-color="#8e24aa" style="background:#8e24aa" title="Lila"></button>
    </div>
    <div class="controls">
      <button id="clearBtn">Törlés</button>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
